<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Manager - API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
        }

        .section h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            max-height: 300px;
            overflow-y: auto;
        }

        .response pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-200 { background: #28a745; color: white; }
        .status-201 { background: #17a2b8; color: white; }
        .status-400 { background: #ffc107; color: black; }
        .status-401 { background: #dc3545; color: white; }
        .status-403 { background: #dc3545; color: white; }
        .status-404 { background: #6c757d; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏦 Personal Finance Manager</h1>
    <p class="subtitle">API Testing Interface</p>

    <!-- Authentication Section -->
    <div class="section">
        <h2>🔐 Authentication</h2>
        <div class="grid">
            <div>
                <h3>Register</h3>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" value="user@test.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" value="password123">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullName" value="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="regPhone" value="+1234567890">
                </div>
                <button onclick="register()">Register</button>
                <div id="regResponse" class="response" style="display:none;"></div>
            </div>

            <div>
                <h3>Login</h3>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" value="user@test.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" value="password123">
                </div>
                <button onclick="login()">Login</button>
                <button onclick="logout()" style="background: #dc3545; margin-left: 10px;">Logout</button>
                <div id="loginResponse" class="response" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Categories Section -->
    <div class="section">
        <h2>📁 Categories</h2>
        <button onclick="getCategories()">Get All Categories</button>
        <div id="catResponse" class="response" style="display:none;"></div>
    </div>

    <!-- Transactions Section -->
    <div class="section">
        <h2>💰 Transactions</h2>
        <div class="grid">
            <div>
                <h3>Create Transaction</h3>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="txAmount" value="50000">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="txDate" value="2024-05-24">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="txCategory" value="Salary">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="txDescription" value="May Salary">
                </div>
                <button onclick="createTransaction()">Create Transaction</button>
                <div id="txCreateResponse" class="response" style="display:none;"></div>
            </div>

            <div>
                <h3>Get Transactions</h3>
                <button onclick="getTransactions()">Get All Transactions</button>
                <div id="txGetResponse" class="response" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Savings Goals Section -->
    <div class="section">
        <h2>🎯 Savings Goals</h2>
        <div class="grid">
            <div>
                <h3>Create Goal</h3>
                <div class="form-group">
                    <label>Goal Name</label>
                    <input type="text" id="goalName" value="Emergency Fund">
                </div>
                <div class="form-group">
                    <label>Target Amount</label>
                    <input type="number" id="goalAmount" value="100000">
                </div>
                <div class="form-group">
                    <label>Target Date</label>
                    <input type="date" id="goalDate" value="2025-12-31">
                </div>
                <button onclick="createGoal()">Create Goal</button>
                <div id="goalCreateResponse" class="response" style="display:none;"></div>
            </div>

            <div>
                <h3>Get Goals</h3>
                <button onclick="getGoals()">Get All Goals</button>
                <div id="goalGetResponse" class="response" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';

    function showResponse(elementId, status, data) {
        const el = document.getElementById(elementId);
        el.style.display = 'block';

        const statusClass = status >= 200 && status < 300 ? 'success' : 'error';
        el.className = `response ${statusClass}`;

        el.innerHTML = `
                <span class="status-badge status-${status}">${status} ${getStatusText(status)}</span>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
    }

    function getStatusText(status) {
        const texts = {
            200: 'OK', 201: 'Created', 400: 'Bad Request',
            401: 'Unauthorized', 403: 'Forbidden', 404: 'Not Found',
            409: 'Conflict'
        };
        return texts[status] || 'Error';
    }

    async function apiCall(method, endpoint, body = null) {
        try {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include' // Important for cookies!
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(`${API_BASE}${endpoint}`, options);
            const data = await response.json();

            return { status: response.status, data };
        } catch (error) {
            return { status: 0, data: { error: error.message } };
        }
    }

    async function register() {
        const result = await apiCall('POST', '/auth/register', {
            username: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            fullName: document.getElementById('regFullName').value,
            phoneNumber: document.getElementById('regPhone').value
        });
        showResponse('regResponse', result.status, result.data);
    }

    async function login() {
        const result = await apiCall('POST', '/auth/login', {
            username: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        });
        showResponse('loginResponse', result.status, result.data);
    }

    async function logout() {
        const result = await apiCall('POST', '/auth/logout');
        showResponse('loginResponse', result.status, result.data);
    }

    async function getCategories() {
        const result = await apiCall('GET', '/categories');
        showResponse('catResponse', result.status, result.data);
    }

    async function createTransaction() {
        const result = await apiCall('POST', '/transactions', {
            amount: parseFloat(document.getElementById('txAmount').value),
            date: document.getElementById('txDate').value,
            category: document.getElementById('txCategory').value,
            description: document.getElementById('txDescription').value
        });
        showResponse('txCreateResponse', result.status, result.data);
    }

    async function getTransactions() {
        const result = await apiCall('GET', '/transactions');
        showResponse('txGetResponse', result.status, result.data);
    }

    async function createGoal() {
        const result = await apiCall('POST', '/goals', {
            goalName: document.getElementById('goalName').value,
            targetAmount: parseFloat(document.getElementById('goalAmount').value),
            targetDate: document.getElementById('goalDate').value
        });
        showResponse('goalCreateResponse', result.status, result.data);
    }

    async function getGoals() {
        const result = await apiCall('GET', '/goals');
        showResponse('goalGetResponse', result.status, result.data);
    }
</script>
</body>
</html>
